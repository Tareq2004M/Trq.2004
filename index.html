<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>موقعي الشخصي</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
        }
        header {
            background: #333;
            color: white;
            padding: 20px;
        }
        .container {
            padding: 20px;
        }
        img {
            width: 150px;
            border-radius: 50%;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<header>
    <h1>Tariq</h1>
    <p>موقعي الشخصي</p>
</header>

<div class="container">
    <div class="card">
        <img src="https://via.placeholder.com/150" alt="صورتي">
        <h2>نبذة عني</h2>
        <p>أنا طالب في جامعة أم القرى، مهتم بالتقنية والبرمجة وتطوير المشاريع.</p>
    </div>

    <div class="card">
        <h2>مهاراتي</h2>
        <p>HTML - CSS - Python</p>
    </div>

    <div class="card">
        <h2>تواصل معي</h2>
        <p>email@example.com</p>
    </div>
</div>

</body>
</html>
